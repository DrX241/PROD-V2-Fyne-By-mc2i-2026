<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Robot Head -->
  <rect x="25" y="20" width="50" height="45" rx="8" fill="#1e75a3" stroke="#0d3b5a" stroke-width="2"/>
  
  <!-- Robot Eyes -->
  <circle cx="40" cy="40" r="8" fill="#e6007e" stroke="#fff" stroke-width="1.5"/>
  <circle cx="60" cy="40" r="8" fill="#e6007e" stroke="#fff" stroke-width="1.5"/>
  
  <!-- Robot Eye Highlights -->
  <circle cx="42" cy="38" r="3" fill="white"/>
  <circle cx="62" cy="38" r="3" fill="white"/>
  
  <!-- Robot Mouth -->
  <rect x="35" y="55" width="30" height="4" rx="2" fill="#fff"/>
  
  <!-- Robot Antenna -->
  <rect x="48" y="10" width="4" height="10" fill="#0d3b5a"/>
  <circle cx="50" cy="10" r="5" fill="#e6007e"/>
  
  <!-- Robot Ears/Side Panels -->
  <rect x="15" y="30" width="10" height="25" rx="3" fill="#0d3b5a"/>
  <rect x="75" y="30" width="10" height="25" rx="3" fill="#0d3b5a"/>
  
  <!-- Robot Neck -->
  <rect x="40" y="65" width="20" height="10" fill="#0d3b5a" rx="2"/>
  
  <!-- Robot Body Outline -->
  <rect x="30" y="75" width="40" height="15" rx="5" fill="#1e75a3" stroke="#0d3b5a" stroke-width="2"/>
  
  <!-- Robot Control Panel -->
  <rect x="40" y="80" width="20" height="5" rx="2" fill="#0d3b5a"/>
  <circle cx="43" cy="82.5" r="1.5" fill="#e6007e"/>
  <circle cx="50" cy="82.5" r="1.5" fill="#fff"/>
  <circle cx="57" cy="82.5" r="1.5" fill="#e6007e"/>
</svg>