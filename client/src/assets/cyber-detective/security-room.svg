<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond de la salle de sécurité -->
  <rect width="100%" height="100%" fill="#11151c"/>
  
  <!-- Sol de la salle -->
  <rect y="500" width="1200" height="300" fill="#1a202c"/>
  
  <!-- Mur de la salle -->
  <rect y="0" width="1200" height="500" fill="#1a1f2b"/>
  
  <!-- Centre de commande principal -->
  <rect x="250" y="150" width="700" height="300" rx="5" fill="#2d3748"/>
  
  <!-- Écrans de surveillance (mur d'écrans) -->
  <rect x="300" y="180" width="600" height="240" fill="#1a202c"/>
  
  <!-- Écrans individuels -->
  <rect x="310" y="190" width="140" height="100" rx="2" fill="#2c3e50"/>
  <rect x="315" y="195" width="130" height="90" rx="2" fill="#4a5568"/>
  
  <rect x="460" y="190" width="140" height="100" rx="2" fill="#2c3e50"/>
  <rect x="465" y="195" width="130" height="90" rx="2" fill="#4a5568"/>
  
  <rect x="610" y="190" width="140" height="100" rx="2" fill="#2c3e50"/>
  <rect x="615" y="195" width="130" height="90" rx="2" fill="#4a5568"/>
  
  <rect x="750" y="190" width="140" height="100" rx="2" fill="#2c3e50"/>
  <rect x="755" y="195" width="130" height="90" rx="2" fill="#4a5568"/>
  
  <rect x="310" y="300" width="140" height="100" rx="2" fill="#2c3e50"/>
  <rect x="315" y="305" width="130" height="90" rx="2" fill="#4a5568"/>
  
  <rect x="460" y="300" width="140" height="100" rx="2" fill="#2c3e50"/>
  <rect x="465" y="305" width="130" height="90" rx="2" fill="#e53e3e" opacity="0.7"/>
  <text x="500" y="350" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">ALERTE</text>
  
  <rect x="610" y="300" width="140" height="100" rx="2" fill="#2c3e50"/>
  <rect x="615" y="305" width="130" height="90" rx="2" fill="#4a5568"/>
  
  <rect x="750" y="300" width="140" height="100" rx="2" fill="#2c3e50"/>
  <rect x="755" y="305" width="130" height="90" rx="2" fill="#4a5568"/>
  
  <!-- Bureau de contrôle -->
  <rect x="300" y="430" width="600" height="60" rx="3" fill="#2d3748"/>
  
  <!-- Claviers et contrôles -->
  <rect x="330" y="440" width="120" height="40" rx="3" fill="#1a202c"/>
  <rect x="480" y="440" width="120" height="40" rx="3" fill="#1a202c"/>
  <rect x="630" y="440" width="120" height="40" rx="3" fill="#1a202c"/>
  <rect x="780" y="440" width="70" height="40" rx="20" fill="#e53e3e"/>
  <text x="815" y="465" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">STOP</text>
  
  <!-- Station de travail avec l'email de phishing -->
  <rect x="350" y="180" width="60" height="40" rx="2" fill="#3182ce"/>
  <rect x="355" y="185" width="50" height="30" rx="1" fill="#ebf8ff"/>
  <line x1="360" y1="195" x2="400" y2="195" stroke="#3182ce" stroke-width="2"/>
  <line x1="360" y1="205" x2="395" y2="205" stroke="#3182ce" stroke-width="2"/>
  <line x1="360" y1="215" x2="380" y2="215" stroke="#3182ce" stroke-width="2"/>
  
  <!-- Terminal du pare-feu -->
  <rect x="500" y="250" width="100" height="80" rx="3" fill="#2c5282"/>
  <rect x="505" y="255" width="90" height="70" rx="2" fill="#2b6cb0"/>
  <line x1="510" y1="265" x2="590" y2="265" stroke="#ebf8ff" stroke-width="1"/>
  <line x1="510" y1="275" x2="570" y2="275" stroke="#ebf8ff" stroke-width="1"/>
  <line x1="510" y1="285" x2="580" y2="285" stroke="#ebf8ff" stroke-width="1"/>
  <line x1="510" y1="295" x2="560" y2="295" stroke="#ebf8ff" stroke-width="1"/>
  <line x1="510" y1="305" x2="575" y2="305" stroke="#ebf8ff" stroke-width="1"/>
  <line x1="510" y1="315" x2="590" y2="315" stroke="#ebf8ff" stroke-width="1"/>
  
  <!-- Clé maîtresse (représentation symbolique) -->
  <circle cx="650" cy="220" r="15" fill="#ecc94b"/>
  <rect x="635" y="220" width="30" height="10" fill="#ecc94b"/>
  <rect x="660" y="220" width="15" height="10" fill="#ecc94b"/>
  <rect x="665" y="215" width="5" height="20" fill="#ecc94b"/>
  <rect x="675" y="220" width="5" height="10" fill="#ecc94b"/>
  
  <!-- Agents de sécurité (silhouettes) -->
  <circle cx="200" cy="200" r="20" fill="#2d3748"/>
  <rect x="180" y="220" width="40" height="60" rx="3" fill="#2d3748"/>
  
  <circle cx="1000" cy="200" r="20" fill="#2d3748"/>
  <rect x="980" y="220" width="40" height="60" rx="3" fill="#2d3748"/>
  
  <!-- Caméras de sécurité -->
  <path d="M150 100 L 180 120 L 180 140 L 150 120 Z" fill="#4a5568"/>
  <circle cx="150" cy="110" r="10" fill="#2d3748"/>
  <circle cx="150" cy="110" r="5" fill="#e53e3e"/>
  
  <path d="M1050 100 L 1020 120 L 1020 140 L 1050 120 Z" fill="#4a5568"/>
  <circle cx="1050" cy="110" r="10" fill="#2d3748"/>
  <circle cx="1050" cy="110" r="5" fill="#e53e3e"/>
  
  <!-- Porte vers le bureau principal -->
  <rect x="100" y="250" width="100" height="250" fill="#2d3748"/>
  <circle cx="180" cy="380" r="10" fill="#ecc94b"/>
  
  <!-- Porte vers le laboratoire forensique -->
  <rect x="1000" y="250" width="100" height="250" fill="#2d3748"/>
  <circle cx="1020" cy="380" r="10" fill="#ecc94b"/>
  <rect x="1015" y="375" width="10" height="10" fill="#e53e3e"/>
  <text x="1050" y="240" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">ACCÈS RESTREINT</text>
  
  <!-- Voyants d'alarme -->
  <circle cx="800" y="100" r="15" fill="#e53e3e"/>
  <circle cx="850" y="100" r="15" fill="#ecc94b"/>
  <circle cx="900" y="100" r="15" fill="#38a169"/>
</svg>