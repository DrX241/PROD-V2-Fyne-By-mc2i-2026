<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="terminalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <filter id="terminalShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Cadre du terminal -->
  <rect x="10" y="10" width="280" height="180" rx="5" fill="#2c3e50" filter="url(#terminalShadow)"/>
  
  <!-- Écran du terminal -->
  <rect x="20" y="20" width="260" height="160" rx="3" fill="url(#terminalGradient)"/>
  
  <!-- Barre de titre -->
  <rect x="20" y="20" width="260" height="20" rx="3" fill="#34495e"/>
  <text x="35" y="35" font-family="monospace" font-size="12" fill="#ecf0f1">Terminal - bash</text>
  <circle cx="265" cy="30" r="5" fill="#e74c3c"/>
  <circle cx="245" cy="30" r="5" fill="#f39c12"/>
  <circle cx="225" cy="30" r="5" fill="#2ecc71"/>
  
  <!-- Contenu du terminal -->
  <text x="30" y="60" font-family="monospace" font-size="12" fill="#2ecc71">user@server:~$</text>
  <text x="130" y="60" font-family="monospace" font-size="12" fill="#ecf0f1">ssh admin@192.168.1.10</text>
  
  <text x="30" y="80" font-family="monospace" font-size="12" fill="#ecf0f1">Password:</text>
  <text x="100" y="80" font-family="monospace" font-size="12" fill="#ecf0f1">********</text>
  
  <text x="30" y="100" font-family="monospace" font-size="12" fill="#2ecc71">admin@server:~$</text>
  <text x="135" y="100" font-family="monospace" font-size="12" fill="#ecf0f1">ls -la</text>
  
  <text x="30" y="120" font-family="monospace" font-size="12" fill="#ecf0f1">total 20</text>
  <text x="30" y="140" font-family="monospace" font-size="12" fill="#ecf0f1">drwxr-xr-x 2 admin admin 4096 Apr 10 08:30 config</text>
  <text x="30" y="160" font-family="monospace" font-size="12" fill="#ecf0f1">-rw-r--r-- 1 admin admin 2048 Apr 10 09:15 firewall.conf</text>
  
  <text x="30" y="180" font-family="monospace" font-size="12" fill="#2ecc71">admin@server:~$</text>
  <text x="135" y="180" font-family="monospace" font-size="12" fill="#ecf0f1">_</text>
</svg>