<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2980b9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
    </linearGradient>
    <filter id="computerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Base/support -->
  <rect x="100" y="230" width="100" height="10" rx="2" fill="#34495e" filter="url(#computerShadow)"/>
  <rect x="140" y="210" width="20" height="30" fill="#2c3e50"/>
  
  <!-- Moniteur -->
  <rect x="50" y="70" width="200" height="140" rx="5" fill="#2c3e50" filter="url(#computerShadow)"/>
  <rect x="60" y="80" width="180" height="110" rx="3" fill="url(#screenGradient)"/>
  
  <!-- Éléments d'écran -->
  <rect x="80" y="100" width="140" height="20" rx="2" fill="#ecf0f1" opacity="0.8"/>
  <rect x="80" y="130" width="70" height="10" rx="2" fill="#ecf0f1" opacity="0.6"/>
  <rect x="80" y="150" width="100" height="10" rx="2" fill="#ecf0f1" opacity="0.6"/>
  <rect x="80" y="170" width="50" height="10" rx="2" fill="#ecf0f1" opacity="0.6"/>
  
  <!-- Icône de verrouillage -->
  <circle cx="200" cy="150" r="15" fill="#e74c3c" opacity="0.8"/>
  <rect x="195" y="145" width="10" height="15" rx="2" fill="#ecf0f1"/>
  <rect x="197" y="147" width="6" height="10" rx="1" fill="#e74c3c"/>
  <rect x="195" y="140" width="10" height="5" rx="2" fill="#ecf0f1"/>
  
  <!-- Clavier -->
  <rect x="70" y="220" width="160" height="20" rx="3" fill="#34495e"/>
  <rect x="75" y="225" width="150" height="10" rx="1" fill="#2c3e50"/>
  
  <!-- Petites touches -->
  <rect x="80" y="227" width="8" height="6" rx="1" fill="#7f8c8d"/>
  <rect x="95" y="227" width="8" height="6" rx="1" fill="#7f8c8d"/>
  <rect x="110" y="227" width="8" height="6" rx="1" fill="#7f8c8d"/>
  <rect x="125" y="227" width="8" height="6" rx="1" fill="#7f8c8d"/>
  <rect x="140" y="227" width="8" height="6" rx="1" fill="#7f8c8d"/>
  <rect x="155" y="227" width="8" height="6" rx="1" fill="#7f8c8d"/>
  <rect x="170" y="227" width="8" height="6" rx="1" fill="#7f8c8d"/>
  <rect x="185" y="227" width="8" height="6" rx="1" fill="#7f8c8d"/>
  <rect x="200" y="227" width="8" height="6" rx="1" fill="#7f8c8d"/>
  <rect x="215" y="227" width="8" height="6" rx="1" fill="#7f8c8d"/>
  
  <!-- Souris -->
  <ellipse cx="250" cy="230" rx="15" ry="10" fill="#34495e"/>
  
  <!-- Reflet d'écran -->
  <path d="M60,100 L80,90 L220,90 L240,100 L60,100" fill="#ffffff" opacity="0.1"/>
</svg>