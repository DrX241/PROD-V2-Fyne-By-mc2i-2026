<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond du laboratoire forensique -->
  <rect width="100%" height="100%" fill="#0a0e17"/>
  
  <!-- Sol du laboratoire -->
  <rect y="500" width="1200" height="300" fill="#171c26"/>
  
  <!-- Mur du laboratoire -->
  <rect y="0" width="1200" height="500" fill="#11151e"/>
  
  <!-- Grand bureau central -->
  <rect x="200" y="250" width="800" height="300" rx="3" fill="#1e2635"/>
  <rect x="200" y="240" width="800" height="10" fill="#2d3748"/>
  
  <!-- Équipement d'analyse forensique -->
  <rect x="250" y="270" width="200" height="150" rx="5" fill="#2c3e50"/>
  <rect x="260" y="280" width="180" height="130" rx="3" fill="#4a5568"/>
  <rect x="270" y="290" width="160" height="40" rx="2" fill="#2b6cb0"/>
  <line x1="280" y1="310" x2="420" y2="310" stroke="#ebf8ff" stroke-width="2"/>
  <line x1="280" y1="320" x2="400" y2="320" stroke="#ebf8ff" stroke-width="2"/>
  
  <rect x="270" y="340" width="160" height="60" rx="2" fill="#1a202c"/>
  <circle cx="300" cy="370" r="15" fill="#e53e3e"/>
  <circle cx="340" cy="370" r="15" fill="#ecc94b"/>
  <circle cx="380" cy="370" r="15" fill="#38a169"/>
  
  <!-- Écran d'analyse de malware -->
  <rect x="500" y="270" width="240" height="180" rx="5" fill="#2c3e50"/>
  <rect x="510" y="280" width="220" height="160" rx="3" fill="#1a365d"/>
  
  <!-- Code source du malware -->
  <rect x="520" y="290" width="200" height="140" rx="2" fill="#000000"/>
  <line x1="530" y1="305" x2="710" y2="305" stroke="#38a169" stroke-width="1"/>
  <line x1="530" y1="320" x2="690" y2="320" stroke="#ffffff" stroke-width="1"/>
  <line x1="530" y1="335" x2="700" y2="335" stroke="#ffffff" stroke-width="1"/>
  <line x1="530" y1="350" x2="680" y2="350" stroke="#e53e3e" stroke-width="1"/>
  <line x1="530" y1="365" x2="710" y2="365" stroke="#ffffff" stroke-width="1"/>
  <line x1="530" y1="380" x2="670" y2="380" stroke="#ffffff" stroke-width="1"/>
  <line x1="530" y1="395" x2="690" y2="395" stroke="#38a169" stroke-width="1"/>
  <line x1="530" y1="410" x2="650" y2="410" stroke="#ffffff" stroke-width="1"/>
  
  <!-- Coffre-fort numérique -->
  <rect x="800" y="300" width="150" height="120" rx="10" fill="#2d3748"/>
  <rect x="810" y="310" width="130" height="100" rx="5" fill="#1a202c"/>
  <circle cx="875" cy="340" r="15" fill="#2b6cb0"/>
  <line x1="865" y1="340" x2="885" y2="340" stroke="#4a5568" stroke-width="3"/>
  <line x1="875" y1="330" x2="875" y2="350" stroke="#4a5568" stroke-width="3"/>
  <rect x="845" y="370" width="60" height="25" rx="3" fill="#4a5568"/>
  <text x="875" y="387" font-family="monospace" font-size="12" fill="#a0aec0" text-anchor="middle">LOCKED</text>
  
  <!-- Base de données volée -->
  <rect x="500" y="480" width="100" height="40" rx="3" fill="#2c5282"/>
  <rect x="505" y="485" width="90" height="30" rx="2" fill="#2b6cb0"/>
  <line x1="520" y1="495" x2="580" y2="495" stroke="#ebf8ff" stroke-width="1"/>
  <line x1="520" y1="505" x2="570" y2="505" stroke="#ebf8ff" stroke-width="1"/>
  <circle cx="510" cy="495" r="2" fill="#e53e3e"/>
  <circle cx="510" cy="500" r="2" fill="#38a169"/>
  <circle cx="510" cy="505" r="2" fill="#e53e3e"/>
  
  <!-- Système de contrôle d'accès (représentation) -->
  <rect x="700" y="480" width="120" height="50" rx="3" fill="#1a365d"/>
  <circle cx="730" cy="505" r="15" fill="#2b6cb0"/>
  <circle cx="770" cy="505" r="15" fill="#4a5568"/>
  <circle cx="810" cy="505" r="15" fill="#4a5568"/>
  <text x="730" cy="510" font-family="monospace" font-size="12" fill="#a0aec0" text-anchor="middle">1</text>
  <text x="770" cy="510" font-family="monospace" font-size="12" fill="#a0aec0" text-anchor="middle">2</text>
  <text x="810" cy="510" font-family="monospace" font-size="12" fill="#a0aec0" text-anchor="middle">3</text>
  
  <!-- Équipement microscopique -->
  <rect x="320" y="450" width="120" height="80" rx="3" fill="#2c3e50"/>
  <rect x="350" y="440" width="60" height="10" fill="#4a5568"/>
  <rect x="360" y="400" width="40" height="40" fill="#4a5568"/>
  <circle cx="380" cy="490" r="25" fill="#2b6cb0"/>
  <circle cx="380" cy="490" r="15" fill="#ebf8ff"/>
  
  <!-- Fichiers chiffrés (représentation) -->
  <rect x="880" y="470" width="60" height="80" rx="3" fill="#2d3748"/>
  <rect x="885" y="475" width="50" height="10" rx="1" fill="#e53e3e"/>
  <rect x="885" y="490" width="50" height="10" rx="1" fill="#ecc94b"/>
  <rect x="885" y="505" width="50" height="10" rx="1" fill="#38a169"/>
  <rect x="885" y="520" width="50" height="10" rx="1" fill="#2b6cb0"/>
  <rect x="885" y="535" width="50" height="10" rx="1" fill="#e53e3e"/>
  
  <!-- Porte vers le département sécurité -->
  <rect x="50" y="250" width="100" height="250" fill="#2d3748"/>
  <circle cx="130" cy="380" r="10" fill="#ecc94b"/>
  
  <!-- Éclairage spécial du laboratoire -->
  <circle cx="300" cy="100" r="30" fill="#2b6cb0" opacity="0.5"/>
  <circle cx="600" cy="100" r="30" fill="#2b6cb0" opacity="0.5"/>
  <circle cx="900" cy="100" r="30" fill="#2b6cb0" opacity="0.5"/>
  
  <!-- Équipement de récupération de données -->
  <rect x="100" y="350" width="80" height="120" rx="3" fill="#2c3e50"/>
  <rect x="110" y="360" width="60" height="20" rx="2" fill="#1a202c"/>
  <rect x="110" y="390" width="60" height="70" rx="2" fill="#4a5568"/>
  <circle cx="140" cy="425" r="25" fill="#1a202c"/>
  <circle cx="140" cy="425" r="20" fill="#2c3e50"/>
  <circle cx="140" cy="425" r="10" fill="#4a5568"/>
  <circle cx="140" cy="425" r="5" fill="#e53e3e"/>
  
  <!-- Labels -->
  <text x="350" y="450" font-family="Arial" font-size="12" fill="#a0aec0">Analyse Malware</text>
  <text x="875" y="430" font-family="Arial" font-size="12" fill="#a0aec0" text-anchor="middle">Coffre-fort Sécurisé</text>
  <text x="760" y="470" font-family="Arial" font-size="12" fill="#a0aec0" text-anchor="middle">Système de Contrôle</text>
  <text x="550" y="475" font-family="Arial" font-size="10" fill="#a0aec0" text-anchor="middle">Base de Données Client</text>
</svg>