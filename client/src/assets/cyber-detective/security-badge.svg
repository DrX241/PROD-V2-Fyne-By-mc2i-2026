<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="badge-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c62828"/>
      <stop offset="100%" stop-color="#8e0000"/>
    </linearGradient>
  </defs>
  
  <!-- Badge principal -->
  <rect x="20" y="20" width="160" height="260" rx="10" fill="url(#badge-gradient)" filter="url(#shadow)"/>
  <rect x="30" y="30" width="140" height="240" rx="5" fill="#d32f2f"/>
  
  <!-- Ligne de séparation -->
  <rect x="30" y="100" width="140" height="5" fill="#b71c1c"/>
  
  <!-- Zone de la photo -->
  <rect x="45" y="40" width="110" height="130" rx="5" fill="#ffffff"/>
  
  <!-- Silhouette de personne (simple) -->
  <circle cx="100" cy="75" r="25" fill="#d32f2f"/>
  <rect x="75" y="100" width="50" height="60" rx="10" fill="#d32f2f"/>
  
  <!-- Informations du badge -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">TECHSECURE</text>
  <text x="100" y="200" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Accès Sécurité</text>
  <text x="100" y="220" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">ID: SEC-7842-A</text>
  
  <!-- Barcode simplifié -->
  <rect x="40" y="240" width="120" height="20" fill="#ffffff"/>
  <rect x="45" y="242" width="2" height="16" fill="#000000"/>
  <rect x="50" y="242" width="3" height="16" fill="#000000"/>
  <rect x="60" y="242" width="1" height="16" fill="#000000"/>
  <rect x="65" y="242" width="4" height="16" fill="#000000"/>
  <rect x="75" y="242" width="3" height="16" fill="#000000"/>
  <rect x="85" y="242" width="5" height="16" fill="#000000"/>
  <rect x="95" y="242" width="2" height="16" fill="#000000"/>
  <rect x="100" y="242" width="1" height="16" fill="#000000"/>
  <rect x="105" y="242" width="3" height="16" fill="#000000"/>
  <rect x="115" y="242" width="6" height="16" fill="#000000"/>
  <rect x="125" y="242" width="2" height="16" fill="#000000"/>
  <rect x="130" y="242" width="4" height="16" fill="#000000"/>
