  <rect x="150" y="242" width="2" height="16" fill="#000000"/>
  
  <!-- Logo sécurité -->
  <circle cx="100" cy="130" r="15" fill="#ffffff"/>
  <path d="M100,118 L100,118 C94,118 89,123 89,129 C89,135 94,140 100,140 C106,140 111,135 111,129 C111,123 106,118 100,118 Z M105,135 L100,132 L95,135 L96,129 L92,125 L98,124 L100,119 L102,124 L108,125 L104,129 Z" fill="#b71c1c"/>
  
