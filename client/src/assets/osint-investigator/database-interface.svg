<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond principal de l'interface de base de données -->
  <rect x="0" y="0" width="800" height="500" rx="10" ry="10" fill="#0F172A" />
  
  <!-- Barre de titre -->
  <rect x="0" y="0" width="800" height="40" rx="10" ry="10" fill="#1E293B" />
  
  <!-- Titre de l'application -->
  <text x="20" y="25" font-family="Arial" font-size="16" fill="white">OSINT Database Explorer</text>
  
  <!-- Contrôles de la fenêtre -->
  <circle cx="760" cy="20" r="8" fill="#475569" />
  <circle cx="735" cy="20" r="8" fill="#475569" />
  <circle cx="710" cy="20" r="8" fill="#475569" />
  
  <!-- Interface principale -->
  <rect x="10" y="50" width="780" height="440" rx="5" ry="5" fill="#1E293B" />
  
  <!-- Panneau de navigation latéral -->
  <rect x="10" y="50" width="200" height="440" rx="5" ry="5" fill="#0F172A" />
  
  <!-- Logo de la base de données -->
  <circle cx="110" cy="90" r="30" fill="#1E40AF" />
  <text x="110" y="95" font-family="Arial" font-size="18" fill="white" text-anchor="middle">DB</text>
  
  <!-- Options de navigation -->
  <rect x="30" y="140" width="160" height="40" rx="5" ry="5" fill="#2563EB" />
  <text x="110" y="165" font-family="Arial" font-size="14" fill="white" text-anchor="middle">Public Records</text>
  
  <rect x="30" y="190" width="160" height="40" rx="5" ry="5" fill="#1E293B" />
  <text x="110" y="215" font-family="Arial" font-size="14" fill="#94A3B8" text-anchor="middle">Domain Registry</text>
  
  <rect x="30" y="240" width="160" height="40" rx="5" ry="5" fill="#1E293B" />
  <text x="110" y="265" font-family="Arial" font-size="14" fill="#94A3B8" text-anchor="middle">Company Data</text>
  
  <rect x="30" y="290" width="160" height="40" rx="5" ry="5" fill="#1E293B" />
  <text x="110" y="315" font-family="Arial" font-size="14" fill="#94A3B8" text-anchor="middle">Financial Records</text>
  
  <rect x="30" y="340" width="160" height="40" rx="5" ry="5" fill="#1E293B" />
  <text x="110" y="365" font-family="Arial" font-size="14" fill="#94A3B8" text-anchor="middle">Legal Documents</text>
  
  <rect x="30" y="390" width="160" height="40" rx="5" ry="5" fill="#1E293B" />
  <text x="110" y="415" font-family="Arial" font-size="14" fill="#94A3B8" text-anchor="middle">Maps & Location</text>
  
  <!-- Zone principale de contenu -->
  <rect x="220" y="60" width="560" height="420" rx="5" ry="5" fill="#111827" />
  
  <!-- Barre de recherche -->
  <rect x="240" y="80" width="520" height="40" rx="5" ry="5" fill="#1F2937" stroke="#3B82F6" stroke-width="1" />
  <text x="260" y="105" font-family="Arial" font-size="14" fill="#94A3B8">Rechercher dans les registres publics...</text>
  <rect x="700" y="85" width="30" height="30" rx="5" ry="5" fill="#2563EB" />
  <text x="715" y="105" font-family="Arial" font-size="14" fill="white" text-anchor="middle">⌕</text>
  
  <!-- Filtres -->
  <rect x="240" y="130" width="520" height="40" rx="0" ry="0" fill="#1E293B" />
  <text x="260" y="155" font-family="Arial" font-size="14" fill="white">Filtres:</text>
  
  <rect x="320" y="135" width="100" height="30" rx="15" ry="15" fill="#1F2937" />
  <text x="370" y="155" font-family="Arial" font-size="12" fill="#94A3B8" text-anchor="middle">Type</text>
  
  <rect x="430" y="135" width="100" height="30" rx="15" ry="15" fill="#1F2937" />
  <text x="480" y="155" font-family="Arial" font-size="12" fill="#94A3B8" text-anchor="middle">Date</text>
  
  <rect x="540" y="135" width="100" height="30" rx="15" ry="15" fill="#1F2937" />
  <text x="590" y="155" font-family="Arial" font-size="12" fill="#94A3B8" text-anchor="middle">Région</text>
  
  <rect x="650" y="135" width="100" height="30" rx="15" ry="15" fill="#1F2937" />
  <text x="700" y="155" font-family="Arial" font-size="12" fill="#94A3B8" text-anchor="middle">Avancé</text>
  
  <!-- Tableau des résultats -->
  <rect x="240" y="180" width="520" height="280" rx="5" ry="5" fill="#1F2937" />
  
  <!-- En-tête du tableau -->
  <rect x="240" y="180" width="520" height="40" rx="5" ry="5" fill="#2D3748" />
  <text x="270" y="205" font-family="Arial" font-size="14" fill="white">ID</text>
  <text x="370" y="205" font-family="Arial" font-size="14" fill="white">Nom</text>
  <text x="520" y="205" font-family="Arial" font-size="14" fill="white">Type</text>
  <text x="620" y="205" font-family="Arial" font-size="14" fill="white">Date</text>
  <text x="700" y="205" font-family="Arial" font-size="14" fill="white">Action</text>
  
  <!-- Lignes du tableau -->
  <rect x="240" y="220" width="520" height="40" rx="0" ry="0" fill="#1F2937" />
  <text x="270" y="245" font-family="Arial" font-size="14" fill="#94A3B8">PR-1025</text>
  <text x="370" y="245" font-family="Arial" font-size="14" fill="#E2E8F0">Dubois Industries SAS</text>
  <text x="520" y="245" font-family="Arial" font-size="14" fill="#94A3B8">Entreprise</text>
  <text x="620" y="245" font-family="Arial" font-size="14" fill="#94A3B8">12/03/2025</text>
  <rect x="685" y="225" width="60" height="30" rx="5" ry="5" fill="#2563EB" />
  <text x="715" y="245" font-family="Arial" font-size="12" fill="white" text-anchor="middle">Voir</text>
  
  <rect x="240" y="260" width="520" height="40" rx="0" ry="0" fill="#111827" />
  <text x="270" y="285" font-family="Arial" font-size="14" fill="#94A3B8">PR-1026</text>
  <text x="370" y="285" font-family="Arial" font-size="14" fill="#E2E8F0">Martin Bernard</text>
  <text x="520" y="285" font-family="Arial" font-size="14" fill="#94A3B8">Personne</text>
  <text x="620" y="285" font-family="Arial" font-size="14" fill="#94A3B8">28/02/2025</text>
  <rect x="685" y="265" width="60" height="30" rx="5" ry="5" fill="#2563EB" />
  <text x="715" y="285" font-family="Arial" font-size="12" fill="white" text-anchor="middle">Voir</text>
  
  <rect x="240" y="300" width="520" height="40" rx="0" ry="0" fill="#1F2937" />
  <text x="270" y="325" font-family="Arial" font-size="14" fill="#94A3B8">PR-1027</text>
  <text x="370" y="325" font-family="Arial" font-size="14" fill="#E2E8F0">Cyber-Defence SARL</text>
  <text x="520" y="325" font-family="Arial" font-size="14" fill="#94A3B8">Entreprise</text>
  <text x="620" y="325" font-family="Arial" font-size="14" fill="#94A3B8">15/01/2025</text>
  <rect x="685" y="305" width="60" height="30" rx="5" ry="5" fill="#2563EB" />
  <text x="715" y="325" font-family="Arial" font-size="12" fill="white" text-anchor="middle">Voir</text>
  
  <rect x="240" y="340" width="520" height="40" rx="0" ry="0" fill="#111827" />
  <text x="270" y="365" font-family="Arial" font-size="14" fill="#94A3B8">PR-1028</text>
  <text x="370" y="365" font-family="Arial" font-size="14" fill="#E2E8F0">Immeuble 123 Rue Victor</text>
  <text x="520" y="365" font-family="Arial" font-size="14" fill="#94A3B8">Propriété</text>
  <text x="620" y="365" font-family="Arial" font-size="14" fill="#94A3B8">05/12/2024</text>
  <rect x="685" y="345" width="60" height="30" rx="5" ry="5" fill="#2563EB" />
  <text x="715" y="365" font-family="Arial" font-size="12" fill="white" text-anchor="middle">Voir</text>
  
  <rect x="240" y="380" width="520" height="40" rx="0" ry="0" fill="#1F2937" />
  <text x="270" y="405" font-family="Arial" font-size="14" fill="#94A3B8">PR-1029</text>
  <text x="370" y="405" font-family="Arial" font-size="14" fill="#E2E8F0">SecureTech Solutions</text>
  <text x="520" y="405" font-family="Arial" font-size="14" fill="#94A3B8">Entreprise</text>
  <text x="620" y="405" font-family="Arial" font-size="14" fill="#94A3B8">30/11/2024</text>
  <rect x="685" y="385" width="60" height="30" rx="5" ry="5" fill="#2563EB" />
  <text x="715" y="405" font-family="Arial" font-size="12" fill="white" text-anchor="middle">Voir</text>
  
  <!-- Pagination -->
  <rect x="240" y="430" width="520" height="40" rx="0" ry="0" fill="transparent" />
  <rect x="440" y="435" width="120" height="30" rx="15" ry="15" fill="#1E293B" />
  <text x="460" y="455" font-family="Arial" font-size="14" fill="#64748B">◄</text>
  <text x="500" y="455" font-family="Arial" font-size="14" fill="white" text-anchor="middle">1 / 5</text>
  <text x="540" y="455" font-family="Arial" font-size="14" fill="#3B82F6">►</text>
</svg>