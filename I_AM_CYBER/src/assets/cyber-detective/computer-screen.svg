<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond d'écran de l'ordinateur -->
  <rect x="0" y="0" width="800" height="500" rx="10" ry="10" fill="#0a1929" />
  
  <!-- Barre de titre -->
  <rect x="0" y="0" width="800" height="25" rx="10" ry="10" fill="#1a365d" />
  
  <!-- Écran d'ordinateur principal -->
  <rect x="10" y="30" width="780" height="455" rx="5" ry="5" fill="#061426" stroke="#2d3748" stroke-width="2" />
  
  <!-- Terminaux stylisés à l'arrière-plan pour effet visuel -->
  <rect x="30" y="50" width="740" height="80" rx="3" ry="3" fill="#0d2135" opacity="0.8" />
  <rect x="30" y="150" width="320" height="150" rx="3" ry="3" fill="#0d2135" opacity="0.8" />
  <rect x="370" y="150" width="400" height="150" rx="3" ry="3" fill="#0d2135" opacity="0.8" />
  <rect x="30" y="320" width="740" height="100" rx="3" ry="3" fill="#0d2135" opacity="0.8" />
  
  <!-- Éléments du terminal (icônes) -->
  <circle cx="20" cy="13" r="5" fill="#f56565" />
  <circle cx="40" cy="13" r="5" fill="#ecc94b" />
  <circle cx="60" cy="13" r="5" fill="#48bb78" />
  
  <!-- Titre de la fenêtre -->
  <text x="400" y="18" font-family="monospace" font-size="14" fill="white" text-anchor="middle">TechSecure Terminal - Accès système sécurisé</text>
  
  <!-- Petits détails pour plus de réalisme -->
  <rect x="30" y="55" width="70" height="12" rx="2" ry="2" fill="#2a4365" opacity="0.7" />
  <rect x="110" y="55" width="90" height="12" rx="2" ry="2" fill="#2a4365" opacity="0.7" />
  <rect x="210" y="55" width="30" height="12" rx="2" ry="2" fill="#2a4365" opacity="0.7" />
  
  <rect x="30" y="75" width="140" height="12" rx="2" ry="2" fill="#2a4365" opacity="0.7" />
  <rect x="180" y="75" width="70" height="12" rx="2" ry="2" fill="#2a4365" opacity="0.7" />
  <rect x="260" y="75" width="120" height="12" rx="2" ry="2" fill="#2a4365" opacity="0.7" />
  
  <rect x="30" y="95" width="120" height="12" rx="2" ry="2" fill="#2a4365" opacity="0.7" />
  <rect x="160" y="95" width="50" height="12" rx="2" ry="2" fill="#2a4365" opacity="0.7" />
  
  <!-- Zone du terminal -->
  <rect x="40" y="160" width="300" height="130" rx="0" ry="0" fill="#000e21" stroke="#1a365d" stroke-width="1" />
  
  <!-- Barres de défilement stylisées -->
  <rect x="750" y="320" width="6" height="100" rx="3" ry="3" fill="#4a5568" opacity="0.5" />
  <rect x="750" y="320" width="6" height="40" rx="3" ry="3" fill="#718096" opacity="0.7" />
  
  <!-- Barre d'état en bas -->
  <rect x="10" y="440" width="780" height="25" rx="3" ry="3" fill="#1a365d" opacity="0.7" />
  <text x="400" y="457" font-family="monospace" font-size="12" fill="#a0aec0" text-anchor="middle">Système sécurisé - Confidentialité requise</text>
  
  <!-- Bordure brillante pour effet d'écran -->
  <rect x="0" y="0" width="800" height="500" rx="10" ry="10" fill="none" stroke="#3182ce" stroke-width="2" />
</svg>