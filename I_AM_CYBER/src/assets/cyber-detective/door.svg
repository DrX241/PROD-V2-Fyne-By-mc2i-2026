<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="400" viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="doorGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34495e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
    <filter id="doorShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="4" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Cadre de porte -->
  <rect x="10" y="10" width="180" height="380" rx="3" fill="#7f8c8d" filter="url(#doorShadow)"/>
  
  <!-- Porte principale -->
  <rect x="20" y="20" width="160" height="360" rx="2" fill="url(#doorGradient)"/>
  
  <!-- Panneau de porte -->
  <rect x="40" y="40" width="120" height="320" rx="1" fill="#2c3e50" stroke="#34495e" stroke-width="2"/>
  
  <!-- Poignée de porte -->
  <circle cx="150" cy="200" r="12" fill="#95a5a6"/>
  <circle cx="150" cy="200" r="8" fill="#7f8c8d"/>
  <circle cx="150" cy="200" r="4" fill="#95a5a6"/>
  
  <!-- Plaque de serrure -->
  <rect x="140" cy="200" y="160" width="20" height="30" rx="2" fill="#7f8c8d"/>
  
  <!-- Trou de serrure -->
  <circle cx="150" cy="175" r="4" fill="#2c3e50"/>
  <rect x="150" y="175" width="1" height="5" fill="#2c3e50"/>
  
  <!-- Numéro/nom de salle -->
  <rect x="80" y="60" width="40" height="20" rx="2" fill="#95a5a6"/>
  <text x="100" y="75" font-family="Arial" font-size="12" text-anchor="middle" fill="#2c3e50">ROOM</text>
  
  <!-- Reflets -->
  <rect x="40" y="80" width="10" height="240" fill="#ffffff" opacity="0.05"/>
  <rect x="60" y="80" width="5" height="240" fill="#ffffff" opacity="0.03"/>
</svg>