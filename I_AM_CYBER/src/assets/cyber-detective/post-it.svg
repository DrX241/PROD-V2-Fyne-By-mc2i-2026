<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Base post-it avec coin replié -->
  <path d="M20,20 L180,20 L180,160 C180,160 160,160 160,160 C160,160 160,180 160,180 C160,180 20,180 20,20" fill="#f9e79f" filter="url(#shadow)"/>
  
  <!-- Pli du coin -->
  <path d="M160,160 L180,160 L160,180 Z" fill="#f4d03f"/>
  
  <!-- Lignes pour le texte -->
  <line x1="40" y1="60" x2="160" y2="60" stroke="#d4ac0d" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="40" y1="90" x2="160" y2="90" stroke="#d4ac0d" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="40" y1="120" x2="160" y2="120" stroke="#d4ac0d" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="40" y1="150" x2="160" y2="150" stroke="#d4ac0d" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Texte du mot de passe -->
  <text x="50" y="45" font-family="Comic Sans MS, cursive" font-size="16" fill="#b7950b" transform="rotate(2)">Mot de passe admin:</text>
  <text x="60" y="85" font-family="Comic Sans MS, cursive" font-size="24" font-weight="bold" fill="#7d6608" transform="rotate(-1)">Admin123!</text>
  <text x="40" y="135" font-family="Comic Sans MS, cursive" font-size="12" fill="#b7950b" transform="rotate(1)">Ne pas oublier de changer</text>
  <text x="40" y="155" font-family="Comic Sans MS, cursive" font-size="12" fill="#b7950b" transform="rotate(1)">ce mot de passe...</text>
</svg>