<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond du bureau -->
  <rect width="100%" height="100%" fill="#1a2b3c"/>
  
  <!-- Mur -->
  <rect y="0" width="1200" height="500" fill="#2c3e50"/>
  
  <!-- Sol -->
  <rect y="500" width="1200" height="300" fill="#34495e"/>
  
  <!-- Bureau principal -->
  <rect x="150" y="400" width="600" height="200" fill="#7f8c8d"/>
  <rect x="150" y="390" width="600" height="10" fill="#95a5a6"/>
  
  <!-- Espace de travail -->
  <rect x="250" y="300" width="400" height="90" fill="#34495e"/>
  
  <!-- Ordinateur -->
  <rect x="350" y="320" width="200" height="130" rx="5" fill="#2c3e50"/>
  <rect x="370" y="340" width="160" height="90" rx="2" fill="#3498db"/>
  
  <!-- Clavier -->
  <rect x="380" y="450" width="140" height="20" rx="3" fill="#7f8c8d"/>
  
  <!-- Chaise -->
  <rect x="400" y="500" width="100" height="10" rx="2" fill="#7f8c8d"/>
  <rect x="430" y="510" width="40" height="80" rx="2" fill="#7f8c8d"/>
  
  <!-- Post-it sur le bureau -->
  <rect x="550" y="360" width="40" height="40" rx="2" fill="#f1c40f"/>
  <line x1="560" y1="370" x2="580" y2="370" stroke="#34495e" stroke-width="2"/>
  <line x1="560" y1="380" x2="580" y2="380" stroke="#34495e" stroke-width="2"/>
  <line x1="560" y1="390" x2="575" y2="390" stroke="#34495e" stroke-width="2"/>
  
  <!-- Porte de la salle serveur -->
  <rect x="900" y="250" width="100" height="250" fill="#7f8c8d"/>
  <circle cx="920" cy="380" r="10" fill="#f39c12"/>
  
  <!-- Porte du département sécurité -->
  <rect x="100" y="250" width="100" height="250" fill="#7f8c8d"/>
  <circle cx="180" cy="380" r="10" fill="#f39c12"/>
  
  <!-- Badge de sécurité -->
  <rect x="270" y="330" width="40" height="60" rx="3" fill="#e74c3c"/>
  <rect x="280" y="340" width="20" height="25" rx="10" fill="#ecf0f1"/>
  <rect x="275" y="370" width="30" height="5" fill="#ecf0f1"/>
  <rect x="275" y="380" width="30" height="5" fill="#ecf0f1"/>
  
  <!-- Fenêtres -->
  <rect x="650" y="100" width="100" height="150" fill="#3498db" opacity="0.7"/>
  <line x1="700" y1="100" x2="700" y2="250" stroke="#ecf0f1" stroke-width="3"/>
  <line x1="650" y1="175" x2="750" y2="175" stroke="#ecf0f1" stroke-width="3"/>
  
  <rect x="450" y="100" width="100" height="150" fill="#3498db" opacity="0.7"/>
  <line x1="500" y1="100" x2="500" y2="250" stroke="#ecf0f1" stroke-width="3"/>
  <line x1="450" y1="175" x2="550" y2="175" stroke="#ecf0f1" stroke-width="3"/>
  
  <!-- Éléments décoratifs -->
  <rect x="800" y="150" width="50" height="100" fill="#16a085"/>
  <rect x="250" y="150" width="120" height="80" fill="#8e44ad"/>
  
  <!-- Étiquettes -->
  <text x="940" y="230" font-family="Arial" font-size="20" fill="#ecf0f1">Salle Serveur</text>
  <text x="100" y="230" font-family="Arial" font-size="20" fill="#ecf0f1">Département Sécurité</text>
  <text x="550" y="340" font-family="Arial" font-size="12" fill="#000">Mot de passe</text>

  <!-- Panneau digital -->
  <rect x="620" y="540" width="300" height="200" rx="10" fill="#34495e"/>
  <rect x="640" y="560" width="260" height="160" rx="5" fill="#2c3e50"/>
  <text x="670" y="640" font-family="Arial" font-size="24" fill="#3498db">TECHSECURE</text>
  <text x="690" y="680" font-family="Arial" font-size="16" fill="#ecf0f1">Sécurité Maximale</text>
</svg>