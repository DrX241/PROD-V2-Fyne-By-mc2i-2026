<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond principal du réseau social -->
  <rect x="0" y="0" width="800" height="500" rx="10" ry="10" fill="#1E293B" />
  
  <!-- Barre de titre de l'application -->
  <rect x="0" y="0" width="800" height="50" rx="10" ry="10" fill="#334155" />
  
  <!-- Zone principale -->
  <rect x="10" y="60" width="780" height="430" rx="5" ry="5" fill="#0F172A" />
  
  <!-- Logo du réseau social -->
  <circle cx="30" cy="25" r="15" fill="#3B82F6" />
  <text x="30" y="30" font-family="Arial" font-size="14" fill="white" text-anchor="middle">S</text>
  <text x="60" y="30" font-family="Arial" font-size="16" fill="white">SocialConnect</text>
  
  <!-- Barre de recherche -->
  <rect x="250" y="15" width="300" height="30" rx="15" ry="15" fill="#1F2937" />
  <text x="270" y="35" font-family="Arial" font-size="14" fill="#94A3B8">Rechercher un utilisateur...</text>
  
  <!-- Icônes de navigation -->
  <circle cx="600" cy="25" r="15" fill="#1F2937" />
  <circle cx="640" cy="25" r="15" fill="#1F2937" />
  <circle cx="680" cy="25" r="15" fill="#1F2937" />
  <circle cx="720" cy="25" r="15" fill="#1F2937" />
  <circle cx="760" cy="25" r="15" fill="#1F2937" />
  
  <!-- Interface de profil -->
  <rect x="20" y="70" width="240" height="410" rx="5" ry="5" fill="#1E293B" />
  
  <!-- Photo de profil -->
  <circle cx="140" cy="130" r="60" fill="#334155" />
  <circle cx="140" cy="130" r="58" fill="#475569" />
  
  <!-- Informations du profil -->
  <text x="140" y="220" font-family="Arial" font-size="18" fill="white" text-anchor="middle">Alex Dupont</text>
  <text x="140" y="245" font-family="Arial" font-size="14" fill="#94A3B8" text-anchor="middle">@alex_cybersec</text>
  
  <!-- Description et statut -->
  <rect x="40" y="265" width="200" height="60" rx="5" ry="5" fill="transparent" />
  <text x="40" y="285" font-family="Arial" font-size="14" fill="#94A3B8">Spécialiste en cybersécurité</text>
  <text x="40" y="305" font-family="Arial" font-size="14" fill="#94A3B8">Digital forensics & OSINT</text>
  
  <!-- Stats du profil -->
  <rect x="40" y="330" width="200" height="30" rx="0" ry="0" fill="transparent" />
  <text x="40" y="350" font-family="Arial" font-size="14" fill="white">284</text>
  <text x="70" y="350" font-family="Arial" font-size="14" fill="#94A3B8">Abonnements</text>
  <text x="160" y="350" font-family="Arial" font-size="14" fill="white">512</text>
  <text x="190" y="350" font-family="Arial" font-size="14" fill="#94A3B8">Abonnés</text>
  
  <!-- Boutons d'action -->
  <rect x="40" y="370" width="200" height="40" rx="20" ry="20" fill="#2563EB" />
  <text x="140" y="395" font-family="Arial" font-size="14" fill="white" text-anchor="middle">Suivre</text>
  
  <rect x="40" y="420" width="95" height="40" rx="5" ry="5" fill="#1F2937" />
  <text x="87.5" y="445" font-family="Arial" font-size="14" fill="white" text-anchor="middle">Message</text>
  
  <rect x="145" y="420" width="95" height="40" rx="5" ry="5" fill="#1F2937" />
  <text x="192.5" y="445" font-family="Arial" font-size="14" fill="white" text-anchor="middle">Partager</text>
  
  <!-- Fil d'actualité -->
  <rect x="280" y="70" width="500" height="410" rx="5" ry="5" fill="#1E293B" />
  
  <!-- Onglets de navigation -->
  <rect x="280" y="70" width="500" height="40" rx="0" ry="0" fill="#334155" />
  <rect x="280" y="70" width="100" height="40" rx="0" ry="0" fill="#2563EB" />
  <text x="330" y="95" font-family="Arial" font-size="14" fill="white" text-anchor="middle">Publications</text>
  <text x="430" y="95" font-family="Arial" font-size="14" fill="#94A3B8" text-anchor="middle">Photos</text>
  <text x="530" y="95" font-family="Arial" font-size="14" fill="#94A3B8" text-anchor="middle">Vidéos</text>
  <text x="630" y="95" font-family="Arial" font-size="14" fill="#94A3B8" text-anchor="middle">À propos</text>
  <text x="730" y="95" font-family="Arial" font-size="14" fill="#94A3B8" text-anchor="middle">Amis</text>
  
  <!-- Publications -->
  <!-- Publication 1 -->
  <rect x="290" y="120" width="480" height="120" rx="5" ry="5" fill="#0F172A" />
  <circle cx="320" cy="145" r="15" fill="#475569" />
  <text x="350" y="145" font-family="Arial" font-size="14" fill="white">Alex Dupont</text>
  <text x="350" y="160" font-family="Arial" font-size="12" fill="#94A3B8">Il y a 2 heures</text>
  <rect x="320" y="170" width="430" height="50" rx="0" ry="0" fill="transparent" />
  <text x="320" y="190" font-family="Arial" font-size="14" fill="#E2E8F0">
    Journée captivante au forum sur la cybersécurité. J'ai particulièrement
  </text>
  <text x="320" y="210" font-family="Arial" font-size="14" fill="#E2E8F0">
    apprécié les discussions sur les nouvelles techniques d'OSINT.
  </text>
  
  <!-- Publication 2 -->
  <rect x="290" y="250" width="480" height="120" rx="5" ry="5" fill="#0F172A" />
  <circle cx="320" cy="275" r="15" fill="#475569" />
  <text x="350" y="275" font-family="Arial" font-size="14" fill="white">Alex Dupont</text>
  <text x="350" y="290" font-family="Arial" font-size="12" fill="#94A3B8">Hier à 18:45</text>
  <rect x="320" y="300" width="430" height="50" rx="0" ry="0" fill="transparent" />
  <text x="320" y="320" font-family="Arial" font-size="14" fill="#E2E8F0">
    Nouveau post sur mon blog: "Comment protéger votre identité en ligne".
  </text>
  <text x="320" y="340" font-family="Arial" font-size="14" fill="#E2E8F0">
    Lien dans ma bio. #cybersecurity #privacymatters
  </text>
  
  <!-- Publication 3 -->
  <rect x="290" y="380" width="480" height="90" rx="5" ry="5" fill="#0F172A" />
  <circle cx="320" cy="405" r="15" fill="#475569" />
  <text x="350" y="405" font-family="Arial" font-size="14" fill="white">Alex Dupont</text>
  <text x="350" y="420" font-family="Arial" font-size="12" fill="#94A3B8">28 mars 2025</text>
  <rect x="320" y="430" width="430" height="30" rx="0" ry="0" fill="transparent" />
  <text x="320" y="450" font-family="Arial" font-size="14" fill="#E2E8F0">
    En route pour la conférence SecureCyber à Lyon. DM moi si tu y seras aussi!
  </text>
</svg>